<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>الفريق الميداني - العدادات</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background: #eef2f7; }
        .container { max-width: 1200px; margin: auto; background: white; border-radius: 24px; padding: 20px; }
        h1 { color: #1e466e; }
        .map { height: 500px; border-radius: 20px; margin: 20px 0; }
        .task-list { max-height: 400px; overflow-y: auto; }
        .task-card { background: white; border-radius: 16px; padding: 12px; margin: 10px 0; border-right: 6px solid; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .priority-1 { border-right-color: #e74c3c; background: #fff5f5; }
        .priority-2 { border-right-color: #f39c12; }
        .priority-3 { border-right-color: #3498db; }
        .priority-4 { border-right-color: #2ecc71; }
        button { background: #2c5f8a; color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; margin-top: 8px; margin-left: 8px; }
        .btn-done { background: #27ae60; }
        a { text-decoration: none; display: inline-block; margin-top: 8px; background: #3498db; color: white; padding: 6px 12px; border-radius: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🚀 فريق <span id="teamNumber"></span> - مهامي الميدانية</h1>
    <div id="map" class="map"></div>
    <h3>📋 قائمة العدادات (مرتبة حسب الأولوية)</h3>
    <div id="tasksList" class="task-list"></div>
</div>
<script src="config.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const teamId = urlParams.get("team");
    if (!teamId || teamId < 1 || teamId > 5) {
        document.body.innerHTML = "<h2>رابط غير صالح. استخدم ?team=1 إلى 5</h2>";
    } else {
        document.getElementById("teamNumber").innerText = teamId;
        initTeamMap();
        loadTeamTasks();
    }

    let map;
    let markersLayer;

    function initTeamMap() {
        map = L.map('map').setView([24.7136, 46.6753], 8);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
        }).addTo(map);
    }

    async function loadTeamTasks() {
        try {
            const res = await fetch(`${API_BASE}?action=getTasks&team=${teamId}`);
            const tasks = await res.json();
            const container = document.getElementById('tasksList');
            container.innerHTML = '';
            if (markersLayer) map.removeLayer(markersLayer);
            markersLayer = L.layerGroup().addTo(map);
            if (!tasks.length) { container.innerHTML = '<p>لا توجد مهام حالياً</p>'; return; }
            tasks.forEach(task => {
                const card = document.createElement('div');
                card.className = `task-card priority-${task.Priority}`;
                card.innerHTML = `
                    <strong>عداد: ${task.MeterNumber}</strong><br>
                    الإجراء: ${task.Action} | الأولوية: ${task.Priority}<br>
                    الموقع: (${task.Lat}, ${task.Lng})<br>
                    الحالة: ${task.Status}<br>
                    <a href="https://www.google.com/maps/dir/?api=1&destination=${task.Lat},${task.Lng}" target="_blank">🗺️ فتح الخريطة</a><br>
                    <button class="btn-start" data-row="${task.row}">▶️ بدء التنفيذ</button>
                    <button class="btn-done" data-row="${task.row}">✔️ إنهاء</button>
                `;
                container.appendChild(card);
                const marker = L.marker([task.Lat, task.Lng]).addTo(markersLayer);
                marker.bindPopup(`<b>${task.MeterNumber}</b><br>${task.Action}`);
            });
            document.querySelectorAll('.btn-start').forEach(btn => {
                btn.addEventListener('click', async () => {
                    await updateStatus(btn.dataset.row, "InProgress");
                    loadTeamTasks();
                });
            });
            document.querySelectorAll('.btn-done').forEach(btn => {
                btn.addEventListener('click', async () => {
                    await updateStatus(btn.dataset.row, "Done");
                    loadTeamTasks();
                });
            });
        } catch (err) { console.error(err); }
    }

    async function updateStatus(row, status) {
        await fetch(API_BASE, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "updateTaskStatus", row: parseInt(row), Status: status })
        });
    }
</script>
</body>
</html>
